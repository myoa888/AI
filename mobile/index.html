<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的文章 - AI文章管理</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .article-card { cursor: pointer; }
    .article-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .article-excerpt { font-size: 14px; color: #666; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
    .article-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #999; }
    .article-cover { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 8px; }
    .filter-tab { padding: 8px 16px; background: #E8E8E8; border-radius: 20px; font-size: 14px; white-space: nowrap; }
    .filter-tab.active { background: var(--primary); color: white; }
    .fab { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--primary); color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(74,144,217,0.4); cursor: pointer; }
  </style>
</head>
<body>
  <div class="header">
    <h1>我的文章</h1>
  </div>

  <div class="page-content">
    <div class="filter-tabs" id="filterTabs">
      <div class="filter-tab active" data-status="">全部</div>
      <div class="filter-tab" data-status="draft">草稿</div>
      <div class="filter-tab" data-status="pending">待发布</div>
      <div class="filter-tab" data-status="published">已发布</div>
    </div>

    <div id="articleList"></div>
  </div>

  <a href="/mobile/create.html" class="fab">+</a>

  <nav class="bottom-nav">
    <a href="/mobile/index.html" class="nav-item active"><span class="icon">📄</span>文章</a>
    <a href="/mobile/idea.html" class="nav-item"><span class="icon">💡</span>创意</a>
    <a href="/mobile/category.html" class="nav-item"><span class="icon">📁</span>分类</a>
    <a href="/mobile/profile.html" class="nav-item"><span class="icon">👤</span>我的</a>
  </nav>

  <script src="/js/api.js"></script>
  <script>
    let currentStatus = '';
    let articles = [];

    // 检查登录
    if (!API.user.isLoggedIn()) {
      window.location.href = '/mobile/login.html';
    }

    // 加载文章列表
    async function loadArticles() {
      const listEl = document.getElementById('articleList');
      listEl.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
      
      try {
        const res = await API.articles.list({ status: currentStatus });
        articles = res.articles || [];
        renderArticles();
      } catch (err) {
        listEl.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败: ' + err.message + '</p></div>';
      }
    }

    // 渲染文章列表
    function renderArticles() {
      const listEl = document.getElementById('articleList');
      
      if (articles.length === 0) {
        listEl.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>暂无文章</p><p style="font-size:12px;color:#999;">点击右下角+创建新文章</p></div>';
        return;
      }

      listEl.innerHTML = articles.map(article => `
        <div class="card article-card" onclick="location.href='/mobile/article.html?id=${article.id}'">
          ${article.cover_image ? `<img src="${article.cover_image}" class="article-cover" alt="封面">` : ''}
          <div class="article-title">${Utils.escapeHtml(article.title)}</div>
          <div class="article-excerpt">${Utils.escapeHtml(article.content.replace(/[#*`\[\]]/g, '').substring(0, 100))}...</div>
          <div class="article-meta">
            <span class="tag tag-${article.status}">${getStatusText(article.status)}</span>
            <span>${Utils.formatDate(article.created_at)}</span>
          </div>
        </div>
      `).join('');
    }

    function getStatusText(status) {
      const map = { draft: '草稿', pending: '待发布', published: '已发布' };
      return map[status] || status;
    }

    // 筛选
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentStatus = tab.dataset.status;
        loadArticles();
      };
    });

    loadArticles();
  </script>
</body>
</html>
