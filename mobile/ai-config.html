<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI配置 - AI文章管理</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .config-tabs { display: flex; background: white; border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
    .config-tab { flex: 1; padding: 14px; text-align: center; font-size: 15px; cursor: pointer; }
    .config-tab.active { background: var(--primary); color: white; }
    .config-item { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .config-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .config-name { font-size: 16px; font-weight: 600; }
    .config-model { font-size: 13px; color: #666; margin-bottom: 8px; }
    .config-default { font-size: 12px; padding: 2px 8px; background: #E8F5E9; color: #4CAF50; border-radius: 4px; }
    .config-disabled { background: #EEEEEE; color: #999; }
    .config-actions { display: flex; gap: 8px; margin-top: 12px; }
    .config-actions .btn { flex: 1; padding: 8px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <a href="/mobile/profile.html" class="header-back">← 返回</a>
    <h1>AI配置</h1>
  </div>

  <div class="page-content">
    <div class="config-tabs">
      <div class="config-tab active" data-type="text">📝 文章AI</div>
      <div class="config-tab" data-type="image">🖼️ 图片AI</div>
    </div>

    <div id="configList"></div>
  </div>

  <div id="modal" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="width:90%;max-width:400px;">
      <h3 id="modalTitle" style="margin-bottom:20px;text-align:center;">新建AI配置</h3>
      <form id="configForm">
        <input type="hidden" id="configId">
        <input type="hidden" id="configType" value="text">
        <div class="input-group">
          <label>名称</label>
          <input type="text" id="configName" placeholder="如：GPT-4写作" required>
        </div>
        <div class="input-group">
          <label>模型</label>
          <input type="text" id="configModel" placeholder="如：gpt-4" required>
        </div>
        <div class="input-group">
          <label>API Key</label>
          <input type="password" id="configApiKey" placeholder="输入API Key" required>
        </div>
        <div class="input-group">
          <label>API地址（选填）</label>
          <input type="text" id="configEndpoint" placeholder="如：https://api.openai.com/v1/chat/completions">
        </div>
        <div class="input-group">
          <label><input type="checkbox" id="configDefault"> 设为默认</label>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn btn-cancel" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (!API.user.isLoggedIn()) window.location.href = '/mobile/login.html';

    let currentType = 'text';
    let configs = [];

    async function loadConfigs() {
      const listEl = document.getElementById('configList');
      listEl.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';

      try {
        const res = await API.aiConfigs.list();
        configs = (res.configs || []).filter(c => c.type === currentType);
        renderConfigs();
      } catch (err) {
        listEl.innerHTML = '<div class="empty-state"><p>加载失败: ' + err.message + '</p></div>';
      }
    }

    function renderConfigs() {
      const listEl = document.getElementById('configList');

      if (configs.length === 0) {
        listEl.innerHTML = '<div class="empty-state"><div class="icon">🤖</div><p>暂无AI配置</p><p style="font-size:12px;color:#999;">点击右下角+添加</p></div>';
        return;
      }

      listEl.innerHTML = configs.map(cfg => `
        <div class="config-item">
          <div class="config-header">
            <span class="config-name">${Utils.escapeHtml(cfg.name)}</span>
            ${cfg.is_default ? '<span class="config-default">默认</span>' : ''}
            ${!cfg.is_active ? '<span class="config-default config-disabled">已禁用</span>' : ''}
          </div>
          <div class="config-model">模型: ${Utils.escapeHtml(cfg.model)}</div>
          <div class="config-actions">
            ${!cfg.is_default ? `<button class="btn btn-outline" onclick="setDefault(${cfg.id})">设为默认</button>` : ''}
            <button class="btn btn-outline" onclick="editConfig(${cfg.id})">编辑</button>
            <button class="btn btn-danger" onclick="deleteConfig(${cfg.id})">删除</button>
          </div>
        </div>
      `).join('');
    }

    // 切换类型
    document.querySelectorAll('.config-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.config-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentType = tab.dataset.type;
        document.getElementById('configType').value = currentType;
        loadConfigs();
      };
    });

    // 添加按钮
    const fab = document.createElement('div');
    fab.className = 'fab';
    fab.textContent = '+';
    fab.onclick = () => {
      document.getElementById('modalTitle').textContent = '新建AI配置';
      document.getElementById('configForm').reset();
      document.getElementById('configId').value = '';
      document.getElementById('configType').value = currentType;
      document.getElementById('modal').style.display = 'flex';
    };
    document.body.appendChild(fab);

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function editConfig(id) {
      const cfg = configs.find(c => c.id === id);
      if (!cfg) return;

      document.getElementById('modalTitle').textContent = '编辑AI配置';
      document.getElementById('configId').value = cfg.id;
      document.getElementById('configType').value = cfg.type;
      document.getElementById('configName').value = cfg.name;
      document.getElementById('configModel').value = cfg.model;
      document.getElementById('configApiKey').value = cfg.api_key;
      document.getElementById('configEndpoint').value = cfg.api_endpoint || '';
      document.getElementById('configDefault').checked = !!cfg.is_default;
      document.getElementById('modal').style.display = 'flex';
    }

    async function setDefault(id) {
      try {
        await API.aiConfigs.update(id, { is_default: 1 });
        Utils.toast('设置成功');
        loadConfigs();
      } catch (err) {
        Utils.toast(err.message);
      }
    }

    async function deleteConfig(id) {
      if (!await Utils.confirm('确定要删除这个AI配置吗？')) return;
      try {
        await API.aiConfigs.delete(id);
        Utils.toast('删除成功');
        loadConfigs();
      } catch (err) {
        Utils.toast(err.message);
      }
    }

    document.getElementById('configForm').onsubmit = async (e) => {
      e.preventDefault();

      const id = document.getElementById('configId').value;
      const data = {
        name: document.getElementById('configName').value.trim(),
        type: document.getElementById('configType').value,
        model: document.getElementById('configModel').value.trim(),
        api_key: document.getElementById('configApiKey').value,
        api_endpoint: document.getElementById('configEndpoint').value.trim(),
        is_default: document.getElementById('configDefault').checked ? 1 : 0
      };

      try {
        if (id) {
          await API.aiConfigs.update(id, data);
          Utils.toast('更新成功');
        } else {
          await API.aiConfigs.create(data);
          Utils.toast('创建成功');
        }
        closeModal();
        loadConfigs();
      } catch (err) {
        Utils.toast(err.message);
      }
    };

    loadConfigs();
  </script>
</body>
</html>
