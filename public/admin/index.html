<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - AI文章管理系统</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">📝 AI文章管理</div>
      <ul class="sidebar-menu">
        <li class="active"><a href="/admin/index.html">📊 数据统计</a></li>
        <li><a href="/admin/users.html">👥 用户管理</a></li>
        <li><a href="/admin/articles.html">📄 文章管理</a></li>
        <li><a href="/admin/export.html">📥 导出数据</a></li>
        <li><a href="/admin/login.html" onclick="AdminAPI.auth.logout()">🚪 退出</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="header">
        <h1>数据统计</h1>
        <div class="header-user">
          <span id="adminName">管理员</span>
        </div>
      </div>

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="totalUsers">-</div><div class="stat-label">用户总数</div></div>
        <div class="stat-card"><div class="stat-value" id="totalArticles">-</div><div class="stat-label">文章总数</div></div>
        <div class="stat-card success"><div class="stat-value" id="publishedCount">-</div><div class="stat-label">已发布</div></div>
        <div class="stat-card warning"><div class="stat-value" id="aiGenerateCount">-</div><div class="stat-label">AI生成</div></div>
      </div>

      <div class="card">
        <div class="card-title">工作量统计</div>
        <table class="table">
          <thead>
            <tr><th>用户</th><th>文章数</th><th>已发布</th><th>AI生成</th><th>手动发布</th></tr>
          </thead>
          <tbody id="userStatsTable"></tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-title">最近文章</div>
        <table class="table">
          <thead>
            <tr><th>标题</th><th>作者</th><th>状态</th><th>来源</th><th>时间</th></tr>
          </thead>
          <tbody id="recentArticlesTable"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/admin/js/api.js"></script>
  <script>
    if (!AdminAPI.isLoggedIn()) window.location.href = '/admin/login.html';

    const admin = AdminAPI.getCurrentAdmin();
    if (admin) document.getElementById('adminName').textContent = admin.username;

    async function loadStats() {
      try {
        const res = await AdminAPI.stats();
        const stats = res.stats;
        const userStats = res.userStats || [];
        const recentArticles = res.recentArticles || [];

        document.getElementById('totalUsers').textContent = stats.totalUsers || 0;
        document.getElementById('totalArticles').textContent = stats.totalArticles || 0;
        document.getElementById('publishedCount').textContent = stats.publishedCount || 0;
        document.getElementById('aiGenerateCount').textContent = stats.aiGenerateCount || 0;

        // 用户工作量
        document.getElementById('userStatsTable').innerHTML = userStats.length === 0 
          ? '<tr><td colspan="5" class="empty">暂无数据</td></tr>'
          : userStats.map(u => `
            <tr>
              <td>${AdminUtils.escapeHtml(u.username)}</td>
              <td>${u.total}</td>
              <td>${u.published}</td>
              <td>${u.ai_count || 0}</td>
              <td>${u.manual_count || 0}</td>
            </tr>
          `).join('');

        // 最近文章
        document.getElementById('recentArticlesTable').innerHTML = recentArticles.length === 0
          ? '<tr><td colspan="5" class="empty">暂无文章</td></tr>'
          : recentArticles.map(a => `
            <tr>
              <td>${AdminUtils.escapeHtml(a.title)}</td>
              <td>${AdminUtils.escapeHtml(a.username)}</td>
              <td><span class="tag tag-${a.status}">${a.status === 'draft' ? '草稿' : a.status === 'pending' ? '待发布' : '已发布'}</span></td>
              <td>${a.source === 'ai' ? 'AI' : '手动'}</td>
              <td>${AdminUtils.formatDate(a.created_at)}</td>
            </tr>
          `).join('');

      } catch (err) {
        AdminUtils.toast('加载失败: ' + err.message);
      }
    }

    loadStats();
  </script>
</body>
</html>
