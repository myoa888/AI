<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章管理 - AI文章管理系统</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <style>
    .filter-bar { display: flex; gap: 12px; margin-bottom: 16px; }
    .filter-bar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">📝 AI文章管理</div>
      <ul class="sidebar-menu">
        <li><a href="/admin/index.html">📊 数据统计</a></li>
        <li><a href="/admin/users.html">👥 用户管理</a></li>
        <li class="active"><a href="/admin/articles.html">📄 文章管理</a></li>
        <li><a href="/admin/export.html">📥 导出数据</a></li>
        <li><a href="/admin/login.html" onclick="AdminAPI.auth.logout()">🚪 退出</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="header">
        <h1>文章管理</h1>
      </div>

      <div class="filter-bar">
        <select id="statusFilter" onchange="loadArticles()">
          <option value="">全部状态</option>
          <option value="draft">草稿</option>
          <option value="pending">待发布</option>
          <option value="published">已发布</option>
        </select>
        <select id="sourceFilter" onchange="loadArticles()">
          <option value="">全部来源</option>
          <option value="ai">AI生成</option>
          <option value="manual">手动</option>
        </select>
      </div>

      <div class="card">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>标题</th>
              <th>作者</th>
              <th>状态</th>
              <th>来源</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="articlesTable"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/admin/js/api.js"></script>
  <script>
    if (!AdminAPI.isLoggedIn()) window.location.href = '/admin/login.html';

    async function loadArticles() {
      const status = document.getElementById('statusFilter').value;
      const source = document.getElementById('sourceFilter').value;
      
      const params = {};
      if (status) params.status = status;
      if (source) params.source = source;

      try {
        const res = await AdminAPI.articles.list(params);
        const articles = res.articles || [];

        document.getElementById('articlesTable').innerHTML = articles.length === 0
          ? '<tr><td colspan="7" class="empty">暂无文章</td></tr>'
          : articles.map(a => `
            <tr>
              <td>${a.id}</td>
              <td>${AdminUtils.escapeHtml(a.title.substring(0, 30))}${a.title.length > 30 ? '...' : ''}</td>
              <td>${AdminUtils.escapeHtml(a.username)}</td>
              <td><span class="tag tag-${a.status}">${a.status === 'draft' ? '草稿' : a.status === 'pending' ? '待发布' : '已发布'}</span></td>
              <td>${a.source === 'ai' ? '🤖 AI' : '✍️ 手动'}</td>
              <td>${AdminUtils.formatDate(a.created_at)}</td>
              <td>
                <button class="btn btn-danger" onclick="deleteArticle(${a.id})">删除</button>
              </td>
            </tr>
          `).join('');
      } catch (err) {
        AdminUtils.toast('加载失败: ' + err.message);
      }
    }

    async function deleteArticle(id) {
      if (!confirm('确定要删除这篇文章吗？')) return;
      try {
        await AdminAPI.articles.delete(id);
        AdminUtils.toast('删除成功');
        loadArticles();
      } catch (err) {
        AdminUtils.toast(err.message);
      }
    }

    loadArticles();
  </script>
</body>
</html>
