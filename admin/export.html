<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导出数据 - AI文章管理系统</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <style>
    .export-section { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
    .export-section h3 { margin-bottom: 16px; }
    .export-desc { color: #666; font-size: 14px; margin-bottom: 16px; }
    .export-stats { display: flex; gap: 20px; margin-bottom: 20px; }
    .export-stat { text-align: center; }
    .export-stat .value { font-size: 24px; font-weight: bold; color: var(--primary); }
    .export-stat .label { font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">📝 AI文章管理</div>
      <ul class="sidebar-menu">
        <li><a href="/admin/index.html">📊 数据统计</a></li>
        <li><a href="/admin/users.html">👥 用户管理</a></li>
        <li><a href="/admin/articles.html">📄 文章管理</a></li>
        <li class="active"><a href="/admin/export.html">📥 导出数据</a></li>
        <li><a href="/admin/login.html" onclick="AdminAPI.auth.logout()">🚪 退出</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="header">
        <h1>导出数据</h1>
      </div>

      <div class="export-section">
        <h3>📥 导出所有已发布文章</h3>
        <p class="export-desc">将所有已发布的文章导出为Markdown格式压缩包，方便备份和迁移。</p>
        <div class="export-stats">
          <div class="export-stat">
            <div class="value" id="totalExportCount">-</div>
            <div class="label">文章总数</div>
          </div>
          <div class="export-stat">
            <div class="value" id="aiExportCount">-</div>
            <div class="label">AI生成</div>
          </div>
          <div class="export-stat">
            <div class="value" id="manualExportCount">-</div>
            <div class="label">手动发布</div>
          </div>
        </div>
        <button class="btn btn-primary" id="exportBtn" onclick="exportAll()">
          导出Markdown压缩包
        </button>
      </div>

      <div class="export-section">
        <h3>👥 导出用户数据</h3>
        <p class="export-desc">导出所有用户信息和文章统计数据为JSON格式。</p>
        <button class="btn btn-outline" onclick="exportUsers()">
          导出用户JSON
        </button>
      </div>
    </main>
  </div>

  <script src="/admin/js/api.js"></script>
  <script>
    if (!AdminAPI.isLoggedIn()) window.location.href = '/admin/login.html';

    // 加载统计
    async function loadStats() {
      try {
        const res = await AdminAPI.stats();
        const stats = res.stats;
        document.getElementById('totalExportCount').textContent = stats.totalArticles || 0;
        document.getElementById('aiExportCount').textContent = stats.aiGenerateCount || 0;
        document.getElementById('manualExportCount').textContent = (stats.manualGenerateCount || 0);
      } catch (err) {
        console.error('加载统计失败', err);
      }
    }

    // 导出所有文章
    async function exportAll() {
      const btn = document.getElementById('exportBtn');
      btn.disabled = true;
      btn.textContent = '导出中...';

      try {
        const blob = await AdminAPI.exportAll();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `articles_${new Date().toISOString().split('T')[0]}.zip`;
        a.click();
        URL.revokeObjectURL(url);
        AdminUtils.toast('导出成功');
      } catch (err) {
        AdminUtils.toast('导出失败: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '导出Markdown压缩包';
      }
    }

    // 导出用户数据
    async function exportUsers() {
      try {
        const res = await AdminAPI.users.list();
        const users = res.users || [];
        const json = JSON.stringify(users, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `users_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        AdminUtils.toast('导出成功');
      } catch (err) {
        AdminUtils.toast('导出失败: ' + err.message);
      }
    }

    loadStats();
  </script>
</body>
</html>
